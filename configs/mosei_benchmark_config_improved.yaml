# MAFT Configuration for CMU-MOSEI Benchmark - Ultra-Lightweight for MPS
dataset:
  name: "mosei"
  data_dir: "data/mosei"
  max_length: 25           # REDUCED from 30
  audio_max_length: 250    # REDUCED from 300
  visual_max_length: 250   # REDUCED from 300

model:
  name: "MAFT"
  hidden_dim: 384          # REDUCED from 512 (50% smaller)
  num_heads: 6             # REDUCED from 8
  num_layers: 2
  dropout: 0.4
  audio_input_dim: 74
  visual_input_dim: 35
  num_classes: 7
  modality_dropout_rate: 0.3

training:
  batch_size: 1            # REDUCED to 1 for maximum stability
  num_epochs: 60
  lr: 0.0001
  weight_decay: 0.01
  max_grad_norm: 0.5
  classification_weight: 1.0
  regression_weight: 0.5
  consistency_weight: 0.5
  warmup_epochs: 3
  lr_scheduler: "cosine"
  early_stopping_patience: 15
  output_dir: outputs/mosei_benchmark_v2